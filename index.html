<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 냥냥 단어 테스트</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#fff7fa;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:42px;
    color:#ff5fa2;
    font-weight:bold;
    margin-bottom:20px;
}

.quiz-box{
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.top{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    align-items:center;
}

.character-box{
    flex:1;
    min-width:250px;
    text-align:center;
}

.character-box img{
    width:100%;
    max-width:320px;
    border-radius:25px;
    border:6px solid #ffd1e5;
}

.question{
    background:#fff2bf;
    border-radius:25px;
    padding:30px;
    font-size:44px;
    text-align:center;
    font-weight:bold;
    color:#6b3d20;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:18px;
    border-radius:18px;
    border:3px solid #ffc2db;
    font-size:24px;
    box-sizing:border-box;
    margin-top:10px;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    border:none;
    padding:16px;
    border-radius:18px;
    background:#ff5fa2;
    color:white;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    min-height:60px;
}

.score{
    margin-top:15px;
    text-align:center;
    font-size:28px;
    color:#ff5fa2;
    font-weight:bold;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

.word-item{
    background:#fff0f6;
    padding:12px;
    border-radius:15px;
    margin-top:10px;
    font-size:20px;
}

.delete-btn{
    background:red;
    font-size:16px;
    padding:8px 14px;
    margin-left:10px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

    <div class="title">🐱 냥냥 단어 테스트</div>

    <div class="quiz-box">

        <div class="top">

            <div class="character-box">
                <img id="character" src="">
            </div>

            <div style="flex:1;min-width:250px;">

                <div class="question" id="question">로딩중...</div>

                <input id="presentAnswer" placeholder="원형 입력">
                <input id="pastAnswer" placeholder="과거형 입력">

                <div class="button-group">
                    <button onclick="checkAnswer()">정답 확인</button>
                    <button onclick="speakQuestion()">🔊 읽기</button>
                </div>

                <div class="result" id="result"></div>

                <div class="score">
                    ⭐ 점수 : <span id="score">0</span>
                </div>

            </div>

        </div>

    </div>

</div>

<script>

// ===============================
// 📌 GitHub Pages 이미지 경로 안정화
// ===============================

const baseURL = "https://fiona-aji.github.io/wordtest/";

const normalImage = baseURL + "none.jpg";
const happyImage  = baseURL + "happy.jpg";
const sadImage    = baseURL + "sad.jpg";

// ===============================
// 📌 데이터
// ===============================

let words = JSON.parse(localStorage.getItem("catWords")) || [
    {meaning:"가다", present:"go", past:"went"},
    {meaning:"먹다", present:"eat", past:"ate"},
    {meaning:"보다", present:"see", past:"saw"}
];

let wrongWords = JSON.parse(localStorage.getItem("wrongWords")) || [];

let currentWord = {};
let score = 0;

// ===============================
// 📌 저장
// ===============================

function saveAll(){
    localStorage.setItem("catWords", JSON.stringify(words));
    localStorage.setItem("wrongWords", JSON.stringify(wrongWords));
}

// ===============================
// 📌 문제 선택 (틀린 문제 우선)
// ===============================

function getWord(){

    if(wrongWords.length > 0 && Math.random() < 0.5){
        return wrongWords[Math.floor(Math.random() * wrongWords.length)];
    }

    return words[Math.floor(Math.random() * words.length)];
}

// ===============================
// 📌 문제 로드
// ===============================

function loadQuestion(){

    currentWord = getWord();

    document.getElementById("question").innerText =
    currentWord.meaning;

    document.getElementById("presentAnswer").value = "";
    document.getElementById("pastAnswer").value = "";
    document.getElementById("result").innerHTML = "";

    document.getElementById("character").src = normalImage;
}

// ===============================
// 📌 정답 체크
// ===============================

function checkAnswer(){

    const p = document.getElementById("presentAnswer").value.trim().toLowerCase();
    const pa = document.getElementById("pastAnswer").value.trim().toLowerCase();

    const ok = (p === currentWord.present && pa === currentWord.past);

    if(ok){

        score++;
        document.getElementById("score").innerText = score;

        document.getElementById("result").innerHTML = "😻 정답!";
        document.getElementById("result").style.color = "green";

        document.getElementById("character").src = happyImage;

        // 틀린 리스트에서 제거
        wrongWords = wrongWords.filter(w => w.meaning !== currentWord.meaning);

        launchFireworks();

    }else{

        document.getElementById("result").innerHTML =
        `😿 틀림!<br>${currentWord.present} / ${currentWord.past}`;
        document.getElementById("result").style.color = "red";

        document.getElementById("character").src = sadImage;

        // 틀린 문제 추가
        if(!wrongWords.find(w => w.meaning === currentWord.meaning)){
            wrongWords.push(currentWord);
        }
    }

    saveAll();

    setTimeout(loadQuestion, 1800);
}

// ===============================
// 📌 음성
// ===============================

function speakQuestion(){
    speechSynthesis.speak(
        new SpeechSynthesisUtterance(currentWord.meaning)
    );
}

// ===============================
// 📌 엔터키
// ===============================

document.getElementById("pastAnswer").addEventListener("keydown",(e)=>{
    if(e.key === "Enter") checkAnswer();
});

// ===============================
// 📌 폭죽 효과
// ===============================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

function launchFireworks(){

    for(let i=0;i<90;i++){
        particles.push({
            x: innerWidth/2,
            y: innerHeight/2,
            vx:(Math.random()-0.5)*10,
            vy:(Math.random()-0.5)*10,
            life:100
        });
    }
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{

        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle = "#ff4fa3";
        ctx.fillRect(p.x,p.y,4,4);

        if(p.life <= 0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

animate();

// ===============================
// 📌 시작
// ===============================

loadQuestion();

</script>

</body>
</html>
